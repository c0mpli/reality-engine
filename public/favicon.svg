<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#09090b"/>

  <!-- Light cone lines (amber, 45°) -->
  <line x1="32" y1="32" x2="6"  y2="6"  stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="58" y2="6"  stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="6"  y2="58" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="32" x2="58" y2="58" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- t axis (up) -->
  <line x1="32" y1="56" x2="32" y2="8" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- x axis (right) -->
  <line x1="8" y1="32" x2="56" y2="32" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Event dot (white, glowing) -->
  <circle cx="38" cy="22" r="4" fill="white"/>
  <circle cx="38" cy="22" r="7" fill="white" opacity="0.12"/>
</svg>
